pre-commit:
  parallel: true
  commands:
    format:
      glob: "*.{ts,tsx,js,jsx,json,md,css}"
      run: pnpm exec oxfmt --write {staged_files}
      stage_fixed: true
      skip:
        - merge
        - rebase
    lint:
      glob: "*.{ts,tsx,js,jsx}"
      run: pnpm exec oxlint --quiet {staged_files} || true
      skip:
        - merge
        - rebase
    test:
      glob: "*.{ts,tsx}"
      run: pnpm exec vitest run --changed
      skip:
        - merge
        - rebase
    doctor:
      glob: "*.{ts,tsx}"
      run: pnpm exec react-doctor --score --blocking none src/
      skip:
        - merge
        - rebase
    typecheck:
      glob: "*.{ts,tsx}"
      run: pnpm typecheck
      skip:
        - merge
        - rebase

pre-push:
  commands:
    test:
      run: pnpm test
      skip:
        - merge
        - rebase

commit-msg:
  commands:
    commitlint:
      skip:
        - merge
        - rebase
      run: pnpm exec commitlint --edit {1}
